<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Úvěrová zpráva — Nejlepší dárky s.r.o.</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="page page--quiz">
      <h1 class="report-head">
        firma <span class="company">Nejlepší dárky s.r.o.</span> úvěrová zpráva
      </h1>

      <p class="instruction">
        Označte všechny pole, které dle Vás nesou potencionální úvěrové riziko.
        Za každé správně označené dostanete +1 bod a každé špatně označené je -1
        bod.
      </p>

      <div id="grid" class="grid quiz"></div>

      <button id="evaluate" class="btn" type="button">Vyhodnotit</button>
    </main>

    <script src="../js/data.js"></script>
    <script src="../js/page2.js"></script>
  </body>
</html>
